services:
  ai-crm:
    build: .
    container_name: ai-crm
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY:-}
      COMPOSIO_USER_ID: ${COMPOSIO_USER_ID:-}
      COMPOSIO_GMAIL_AUTH_CONFIG_ID: ${COMPOSIO_GMAIL_AUTH_CONFIG_ID:-}
      COMPOSIO_GMAIL_CONNECTED_ACCOUNT_ID: ${COMPOSIO_GMAIL_CONNECTED_ACCOUNT_ID:-}
      COMPOSIO_GMAIL_TOOLKIT_VERSION: ${COMPOSIO_GMAIL_TOOLKIT_VERSION:-20260506_01}
      APP_BASE_URL: ${APP_BASE_URL:-http://38.247.188.228}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://38.247.188.228}
      HOST: ${HOST:-0.0.0.0}
      PAPERCLIP_BASE_URL: ${PAPERCLIP_BASE_URL:-http://host.docker.internal:3100}
      PAPERCLIP_COMPANY_ID: ${PAPERCLIP_COMPANY_ID:-}
      PAPERCLIP_AGENT_ID: ${PAPERCLIP_AGENT_ID:-}
      PAPERCLIP_API_KEY: ${PAPERCLIP_API_KEY:-}
      PAPERCLIP_TIMEOUT_MS: ${PAPERCLIP_TIMEOUT_MS:-120000}
      PAPERCLIP_POLL_INTERVAL_MS: ${PAPERCLIP_POLL_INTERVAL_MS:-1500}
      HERMES_BASE_URL: ${HERMES_BASE_URL:-http://host.docker.internal:8642}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      HERMES_MODEL: ${HERMES_MODEL:-hermes-agent}
      HERMES_TIMEOUT_MS: ${HERMES_TIMEOUT_MS:-120000}
      HERMES_BRIDGE_TOKEN: ${HERMES_BRIDGE_TOKEN:-}
    volumes:
      - ai-crm-data:/app/server/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  ai-crm-data:
